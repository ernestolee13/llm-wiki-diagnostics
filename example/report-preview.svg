<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki Diagnostics example report preview</title>
  <desc id="desc">A sanitized preview of an HTML diagnostic report with summary cards, trend bars, question cards, recommendations, and detail charts.</desc>
  <rect width="1280" height="720" fill="#f5f7fa"/>
  <rect x="56" y="44" width="1168" height="632" rx="18" fill="#ffffff" stroke="#d8e0ea"/>
  <text x="92" y="94" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700" fill="#17202a">LLM Wiki 성능 진단 리포트</text>
  <text x="92" y="126" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#667485">sanitized example preview · values are illustrative</text>

  <g transform="translate(92 160)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="700" fill="#17202a">한눈에 보기</text>
    <g transform="translate(0 22)">
      <rect width="170" height="104" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
      <text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">일반 지식 객체</text>
      <text x="16" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#17202a">716</text>
      <text x="16" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">운영 기록과 분리</text>
    </g>
    <g transform="translate(190 22)">
      <rect width="170" height="104" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
      <text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">진입점/허브</text>
      <text x="16" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#17202a">15</text>
      <text x="16" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#b7791f">index stale 의심</text>
    </g>
    <g transform="translate(380 22)">
      <rect width="170" height="104" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
      <text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">요청당 비용</text>
      <text x="16" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#17202a">1.5m</text>
      <text x="16" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">p90 6.4m · inferred</text>
    </g>
    <g transform="translate(570 22)">
      <rect width="170" height="104" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
      <text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">연결 점검</text>
      <text x="16" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#17202a">23</text>
      <text x="16" y="88" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">content candidates</text>
    </g>
    <g transform="translate(760 22)">
      <rect width="316" height="104" rx="10" fill="#f8fafc" stroke="#d8e0ea"/>
      <text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">월별 요청당 토큰 추세</text>
      <rect x="18" y="54" width="42" height="28" rx="4" fill="#8bb8ff"/>
      <rect x="72" y="57" width="42" height="25" rx="4" fill="#8bb8ff"/>
      <rect x="126" y="34" width="42" height="48" rx="4" fill="#2f6fed"/>
      <rect x="180" y="18" width="42" height="64" rx="4" fill="#1f9d68"/>
      <text x="238" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">heavier</text>
    </g>
  </g>

  <g transform="translate(92 330)">
    <rect width="520" height="170" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <text x="20" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="700" fill="#17202a">위키가 잘 구축되어 있는가?</text>
    <rect x="20" y="62" width="226" height="72" rx="8" fill="#f8fafc" stroke="#d8e0ea"/>
    <text x="34" y="90" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#17202a">인덱스가 탐색을 돕는가?</text>
    <text x="34" y="116" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">hub는 있으나 root 최신성 점검</text>
    <rect x="266" y="62" width="226" height="72" rx="8" fill="#f8fafc" stroke="#d8e0ea"/>
    <text x="280" y="90" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#17202a">문서가 읽기 좋은가?</text>
    <text x="280" y="116" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">p50/p90 크기와 hot large 확인</text>
  </g>

  <g transform="translate(632 330)">
    <rect width="500" height="170" rx="12" fill="#ffffff" stroke="#d8e0ea"/>
    <text x="20" y="38" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="700" fill="#17202a">내가 효율적으로 사용하고 있는가?</text>
    <rect x="20" y="62" width="460" height="18" rx="9" fill="#edf1f5"/>
    <rect x="20" y="62" width="318" height="18" rx="9" fill="#2f6fed"/>
    <text x="20" y="108" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#17202a">조회+작성 혼합 요청이 비용을 주도</text>
    <text x="20" y="134" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#667485">tool calls · elapsed · token signal grouped by request type</text>
  </g>

  <g transform="translate(92 532)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="700" fill="#17202a">추천 방향</text>
    <rect x="0" y="22" width="1040" height="70" rx="12" fill="#f8fafc" stroke="#d8e0ea"/>
    <circle cx="30" cy="57" r="8" fill="#1f9d68"/>
    <text x="52" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" fill="#17202a">진입점 정리 · 반복 broken 후보 분리 · request log로 추정치를 실측으로 전환</text>
  </g>
</svg>
